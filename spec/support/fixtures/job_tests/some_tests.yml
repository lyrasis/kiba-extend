job: fkey
testdefs:
  - testclass: CsvJob::Equal
    tests:
      - select_field: objectnumber
        select_value: OBJ2
        test_field: numberofobjects
        expected: 2
      - select_field: objectnumber
        select_value: OBJ3
        test_field: briefdescription
        expected: Some description
